version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment: 
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000" # API port — this is where Python connects to upload files
      - "9001:9001" # Web UI port — you can browse your files here in browser
    environment:
      MINIO_ROOT_USER: minioadmin
      # WHY? MinIO needs credentials just like AWS S3 needs Access Key ID
      # This is the username to authenticate
      MINIO_ROOT_PASSWORD: minioadmin123 # This is the password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data # Without this, ALL your stored files disappear when Docker restarts # volumes make the data PERSIST between restarts
  
  # Airflow needs its own database to store DAG runs, logs, task states
  # We use PostgreSQL for this (separate from our gold storage)
  airflow-db:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES8DB: airflow
    volumes: 
      - airflow_db_data:/var/lib/postgresql/data

  airflow:
    image: apache/airflow:2.8.0
    depends_on:
      - airflow-db # Airflow only starts AFTER its database is ready
    ports:
      - "8080:8080" # Web UI : naamlou monitoring l dags mteena 
    environment:
      AIRFLOW__COR__EXECUTOR: LocalExecutor
      # WHY LocalExecutor?
      # There are multiple executors:
      # - SequentialExecutor: runs 1 task at a time (only for testing)
      # - LocalExecutor: runs tasks in parallel on same machine ✅ (our choice)
      # - CeleryExecutor: distributes tasks across multiple machines (production)

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      # Connection string to Airflow's own PostgreSQL database
      # Format: postgresql+psycopg2://user:password@host/database

      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      # By default Airflow loads 20+ example DAGs that clutter the UI
      # We disable them to keep only our own DAGs

      AIRFLOW__WESERVER__SECRET_KEY: 'fire_pipline_secret_key'

      FIRMS_API_KEY: ${FIRMS_API_KEY}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    
    volumes:
      - ./dags:/opt/airflow/dags
      # Airflow looks for DAG files in /opt/airflow/dags inside the container
      # This maps our local ./dags folder to that location
      # So any DAG file we create locally is automatically visible to Airflow
      - ./ingestion:/opt/airflow/ingestion
      # Map our ingestion scripts so Airflow can import and run them
      - airflow_logs:/opt/airflow/logs
      # Store task logs persistently so we can debug failures later
    
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@firepipeline.com && airflow webserver & airflow scheduler"
    # WHY this command?
    # 1. 'airflow db init' → creates all Airflow tables in PostgreSQL
    # 2. 'airflow users create' → creates our admin login
    # 3. 'airflow webserver' → starts the web UI (port 8080)
    # 4. 'airflow scheduler' → starts the engine that triggers DAGs on schedule



volumes:
  minio_data: # This declares the volume so Docker knows to create and manage it
  airflow_db_data:
  airflow_logs: